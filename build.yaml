# This file generates the GitHub Actions matrix.
# No dongle: the right half (trackball side) is the BLE central.
# zmk is pinned to v0.3-branch in config/west.yml, where the board is still
# named nice_nano_v2 (on zmk main / Zephyr 4.1 it would be "nice_nano//zmk").
---
include:
  - board: nice_nano_v2
    shield: charybdis_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: charybdis_left
  - board: nice_nano_v2
    shield: settings_reset
  # TEMPORARY (trackball debugging): right half with the Zephyr log console
  # over USB instead of Studio, so the pmw3610 init messages are readable in
  # a serial terminal. Remove this entry once the trackball works.
  - board: nice_nano_v2
    shield: charybdis_right
    snippet: zmk-usb-logging
    # Big log buffer so boot-time messages (pmw3610 init) survive until the
    # serial terminal connects; input debug level to also log ball motion.
    # 64K log buffer: ZMK_USB_LOGGING forces debug level (a warn-level
    # override is ignored), so boot logs survive only by brute buffer size.
    cmake-args: -DCONFIG_ZMK_USB_LOGGING=y -DCONFIG_LOG_BUFFER_SIZE=65536 -DCONFIG_INPUT_LOG_LEVEL_DBG=y
    artifact-name: charybdis_right_logging
