# This file generates the GitHub Actions matrix.
# No dongle: the right half (trackball side) is the BLE central.
# zmk is pinned to v0.3-branch in config/west.yml, where the board is still
# named nice_nano_v2 (on zmk main / Zephyr 4.1 it would be "nice_nano//zmk").
---
include:
  - board: nice_nano_v2
    shield: charybdis_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: charybdis_left
  - board: nice_nano_v2
    shield: settings_reset
  # Trackball bracketing test: logging build forced to a 1s init delay
  # (cmake-args override the 10s in charybdis_right.conf) to isolate whether
  # the Studio build or the delay threshold is what kills the sensor init.
  - board: nice_nano_v2
    shield: charybdis_right
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_USB_LOGGING=y -DCONFIG_LOG_BUFFER_SIZE=65536 -DCONFIG_PMW3610_LOG_LEVEL_DBG=y -DCONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=1000
    artifact-name: charybdis_right_log_1s
