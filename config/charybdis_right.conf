# The PMW3610 on this board fails its init silently when probed right at
# boot (~10ms) but initializes fine when given extra power-up time — found
# 2026-07-16 via a 30s-delayed diagnostic build. 1s is invisible in practice.
CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# No-dongle setup: the right half (trackball side) is the BLE central.
# The module's Kconfig only assigns the central role to the dongle shield,
# so we set it here explicitly.
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# PMW3610 tuning (CPI, orientation, etc.) can go here later if the defaults
# from the module/driver need adjusting, e.g.:
# CONFIG_PMW3610_CPI=1600
# CONFIG_PMW3610_ORIENTATION_90=y
# CONFIG_PMW3610_INVERT_X=y
# CONFIG_PMW3610_INVERT_Y=y
