# The PMW3610 on this board fails its init silently when probed right at
# boot (~10ms) but initializes fine when given extra power-up time — found
# 2026-07-16 via a 30s-delayed diagnostic build. 1s is invisible in practice.
CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# No-dongle setup: the right half (trackball side) is the BLE central.
# The module's Kconfig only assigns the central role to the dongle shield,
# so we set it here explicitly.
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# Sensor orientation: the ball read 90-degrees rotated (left moved the
# cursor down, up moved it right). Swap the axes, then invert both.
CONFIG_PMW3610_SWAP_XY=y
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_INVERT_Y=y

# Pointer speed lives in the sensor CPI (1000 in the shield dtsi); runtime
# trim on the BLT layer (bottom-left pinky = +200, next to it = -200) via the
# custom cpi-adjust behavior. Once a value feels right, bake it into the
# `cpi` property in boards/shields/charybdis/charybdis_3610.dtsi.

# Fix for the "cursor keeps gliding after the ball stops" lag (2026-07-20):
# by default the driver fires one HID report per motion frame (up to ~250Hz),
# but BLE can only deliver one report per connection interval (~11-15ms on
# Windows) — the excess queues in the BT stack and drains late, so motion
# arrives after the ball stopped, in a decaying tail (worse with 2.4GHz
# congestion, since this radio also serves the split link). Coalescing deltas
# to one report per 12ms keeps the queue empty without losing counts — this
# Kconfig exists in the driver exactly for that ("hid queue over the air").
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12
