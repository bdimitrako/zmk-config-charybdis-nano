    '&mmv MOVE_RIGHT': Mouse →

    '&msc SCRL_UP': Scroll ↑
    '&msc SCRL_DOWN': Scroll ↓
    '&msc SCRL_LEFT': Scroll ←
    '&msc SCRL_RIGHT': Scroll →

    '&mouse_speed_tog': Speed Toggle

    '&mkp LCLK': Left Click
    '&mkp RCLK': Right Click
    '&mkp MCLK': Middle Click
    '&mkp MB4': Back Click
    '&mkp MB5': Forward Click    
    '&nextprev': {t: "⏭", s: "⏮"}
    '&kp LC(MINUS)': Zoom Out
    '&kp LC(LS(EQUAL))': Zoom In
    '&kp LC(W)': Tab Close
    '&kp LC(L)': URL Bar
    '&kp LC(R)': Reload
    '&kp LC(T)': New Tab
    '&kp LC(LS(T))': Reopen Tab
  sticky_label: sticky
  toggle_label: toggle
  tap_toggle_label: tap-toggle
  trans_legend:
    t: ▽
    type: trans
  layer_legend_map: {}
  mark_alternate_layer_activators: false
  modifier_fn_map:
    left_ctrl: Ctl
    right_ctrl: Ctl
    left_shift: Sft
    right_shift: Sft
    left_alt: Alt
    right_alt: AltGr
    left_gui: Gui
    right_gui: Gui
    LC: Ctrl
    RC: Ctrl
    LS: Shift
    RS: Shift
    LA: Alt
    RA: AltGr
    LG: 🪟
    RG: 🪟
    keycode_combiner: '{mods}+{key}'
    mod_combiner: '{mod_1}+{mod_2}'
    special_combinations:
      left_ctrl+left_alt+left_gui+left_shift: Hyper
      left_ctrl+left_alt+left_shift: Meh
